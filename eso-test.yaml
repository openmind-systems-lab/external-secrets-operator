# eso-test.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: eso-test
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: fake-store
  namespace: eso-test
spec:
  provider:
    fake:
      data:
        - key: /demo/db-password
          value: local-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-external-secret
  namespace: eso-test
spec:
  refreshInterval: 10s
  secretStoreRef:
    name: fake-store
    kind: SecretStore
  target:
    name: demo-k8s-secret
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /demo/db-password
